<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⍰</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/143974574?s=400&u=c62e5b7b16006c5f845d5ebb8f2aa92fce7ad025&v=4">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="enter-screen" class="enter-screen">
    <button id="enter-btn">Enter</button>
  </div>

  <audio id="bg-music" src="Molly.mp3" loop></audio>

  <div class="background"></div>
  <div class="bio-container" style="display: none; opacity: 0; transition: opacity 0.5s ease;">
    <div class="profile-card">
      <div class="banner"></div>
      <img src="/imgs/pfp.jpg" alt="Profile Picture" class="profile-img">
      <h1 class="name">Wisp</h1>
      
      <div class="project-link">
        <h2>My Latest Project</h2>
        <a href="https://github.com/xojw/waves" class="project-link-btn" target="_blank">
          Waves <span class="tooltip">View Project</span>
        </a>
      </div>
      
      <p class="quote">"In three words I can sum up everything I've learned about life: it goes on."</p>
      <p class="author">- Robert Frost</p>
      
      <div class="social-icons-container">
        <div class="social-icons">
          <a href="http://discord.com/users/1111107934919852063/" class="social-icon" data-tooltip="Discord">
            <i class="fab fa-discord"></i>
            <span class="tooltip">Discord</span>
          </a>
          <a href="https://github.com/xojw/" class="social-icon" data-tooltip="GitHub">
            <i class="fab fa-github"></i>
            <span class="tooltip">GitHub</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("enter-btn").addEventListener("click", function() {
      const enterScreen = document.getElementById("enter-screen");
      const bioContainer = document.querySelector(".bio-container");
      const audio = document.getElementById("bg-music");

      enterScreen.style.opacity = "0";
      setTimeout(() => {
        enterScreen.style.display = "none";
        bioContainer.style.display = "block";
        setTimeout(() => bioContainer.style.opacity = "1", 50);
        audio.play().catch(error => console.log("Autoplay blocked:", error));
      }, 500);
    });

    document.getElementById("bg-music").addEventListener("ended", function() {
      this.currentTime = 0;
      this.play().catch(error => console.log("Autoplay blocked after restart:", error));
    });
  </script>
</body>
</html>
